# What is CD?

# CD = Continuous Delivery / Continuous Deployment

# Meaning:

# “After code is approved/merged, automatically do something.”

# That “something” depends on project.

# Examples:

# Software engineering
# merge to main
# ↓
# deploy app to production server
# Data engineering

# Could be:

# merge to main
# ↓
# run dbt production job

# or:

# merge to main
# ↓
# restart airflow service

# or:

# merge to main
# ↓
# deploy Docker container

# In your case:

# merge to main
# ↓
# trigger dbt Cloud job

# would be CD.

# CI = check code
# CD = do something after merge


# Code merged/pushed to main
#         ↓
# GitHub automatically triggers dbt Cloud job
#         ↓
# dbt Cloud runs:
# staging → snapshots → gold marts


```yaml
# Name shown in GitHub Actions UI
name: CD

# Defines when workflow runs
on:

  # Run ONLY when code is pushed to main branch
  push:
    branches:
      - main


# Jobs GitHub executes
jobs:

  # Job name
  trigger-dbt-cloud:

    # GitHub creates temporary Ubuntu machine
    runs-on: ubuntu-latest

    # Steps executed one by one
    steps:

      # Step 1:
      # Checkout repository code
      #
      # Not strictly required for curl call,
      # but standard practice in workflows
      - name: Checkout repository
        uses: actions/checkout@v4


      # Step 2:
      # Trigger dbt Cloud job using API
      #
      # We read values securely from GitHub Secrets
      #
      # Never hardcode secrets in YAML
      - name: Trigger dbt Cloud job

        # Environment variables
        env:

          # Your dbt Cloud Account ID
          DBT_CLOUD_ACCOUNT_ID: ${{ secrets.DBT_CLOUD_ACCOUNT_ID }}

          # Your dbt Cloud Job ID
          DBT_CLOUD_JOB_ID: ${{ secrets.DBT_CLOUD_JOB_ID }}

          # dbt Cloud API token
          DBT_CLOUD_API_TOKEN: ${{ secrets.DBT_CLOUD_API_TOKEN }}

          # Your dbt Cloud base URL
          # Example:
          # https://gu425.us1.dbt.com
          DBT_CLOUD_BASE_URL: ${{ secrets.DBT_CLOUD_BASE_URL }}


        # Execute shell commands
        run: |

          # Send POST request to dbt Cloud API
          #
          # This triggers your dbt Cloud job
          curl -X POST \
          "$DBT_CLOUD_BASE_URL/api/v2/accounts/$DBT_CLOUD_ACCOUNT_ID/jobs/$DBT_CLOUD_JOB_ID/run/" \
          -H "Authorization: Token $DBT_CLOUD_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"cause":"Triggered by GitHub Actions CD"}'


# How CD is used in real world if my project is on cloud
# GitHub repo
#     ↓
# push to main
#     ↓
# GitHub Actions (CD)
#     ↓
# EC2 server
#     ↓
# pull latest code
#     ↓
# restart Docker containers
#     ↓
# Airflow/Kafka/Consumer run latest code

# Example:

# You modify:

# consumer/kafka_to_s3.py

# or

# s3_to_snowflake_dag.py

# and push:

# git push origin main

# CD can automatically do:

# ssh ec2-instance
# cd banking-modern-datastack
# git pull
# docker compose down
# docker compose up -d --build

# No manual login to EC2.

# That is true deployment.

# So the roadmap becomes:

# 1. Finish local project ✅
# 2. CI in GitHub ✅
# 3. Airflow scheduling automation
# 4. Deploy to AWS EC2
# 5. Add real CD (GitHub → EC2)
# 6. Add README + architecture diagram

# And once on EC2, your pipeline becomes:

# 24/7 running

# instead of:

# only when MacBook is open

# which is a huge jump in professionalism for a portfolio project.